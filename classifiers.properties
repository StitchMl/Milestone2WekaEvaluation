# Declarative classifier catalog
classifiers=RANDOM_FOREST,NAIVE_BAYES,K_NEAREST_NEIGHBORS

classifier.RANDOM_FOREST.displayName=Random Forest
classifier.RANDOM_FOREST.class=weka.classifiers.trees.RandomForest
classifier.RANDOM_FOREST.options=-I 50 -depth 15 -num-slots 1

classifier.NAIVE_BAYES.displayName=Naive Bayes
classifier.NAIVE_BAYES.class=weka.classifiers.bayes.NaiveBayes
classifier.NAIVE_BAYES.options=-K

classifier.K_NEAREST_NEIGHBORS.displayName=K-Nearest Neighbors
classifier.K_NEAREST_NEIGHBORS.class=weka.classifiers.lazy.IBk
classifier.K_NEAREST_NEIGHBORS.options=-K 5
